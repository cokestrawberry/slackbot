# Phase 1에서는 PostgreSQL만 띄움. Phase 2에서 이슈 로컬 캐시 테이블이 실제 사용됨.
# 실행: `docker compose up -d`
services:
  postgres:
    image: postgres:16-alpine
    container_name: jirabot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jirabot}
      POSTGRES_USER: ${POSTGRES_USER:-jirabot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jirabot}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
